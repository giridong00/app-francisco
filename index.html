
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>História - Testes</title>
<style>
body { font-family: Arial; margin:0; background:#111; color:white; text-align:center; }
button { padding:15px; margin:10px; border-radius:10px; border:none; background:#4CAF50; color:white; font-size:18px; }
#progress { width:90%; margin:20px auto; height:20px; background:#333; border-radius:10px; }
#bar { height:100%; width:0%; background:#4CAF50; border-radius:10px; }
</style>
</head>
<body>

<h2>📚 História - Portugal</h2>
<p id="hora"></p>

<div id="progress"><div id="bar"></div></div>

<div id="quiz"></div>

<script src="questions.js"></script>
<script>
let perguntas = bancoPerguntas.sort(()=>0.5-Math.random()).slice(0,50);
let index=0, score=0;

function updateHora(){
document.getElementById("hora").innerText = new Date().toLocaleString();
}
setInterval(updateHora,1000); updateHora();

function render(){
if(index>=perguntas.length) return finish();

let p = perguntas[index];
let html = "<h3>"+p.q+"</h3>";

p.options.forEach((opt,i)=>{
html += `<button onclick="responder(${i})">${opt}</button><br>`;
});

document.getElementById("quiz").innerHTML = html;
document.getElementById("bar").style.width = (index/50*100)+"%";
}

function responder(i){
let p = perguntas[index];
if(i===p.correct){
score++;
} else {
alert("Errado!\nCorreta: "+p.options[p.correct]+"\n"+p.explanation);
}
index++;
render();
}

function finish(){
let resultado = `Resultado: ${score}/50`;
document.getElementById("quiz").innerHTML = "<h2>"+resultado+"</h2>";

let link = "viber://forward?text="+encodeURIComponent(resultado);
window.location.href = link;
}

render();
</script>

</body>
</html>
