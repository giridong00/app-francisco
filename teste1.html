<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teste Inglês</title>
<script>
let score = 0;

function check(answer){
    if(answer === 'correct'){
        score++;
        alert('Correto!');
    } else {
        alert('Errado!');
    }
}

function finish(){
    alert("Resultado: " + score + "/2");
}
</script>
</head>
<body>

<h2>Teste Inglês</h2>

<p>1. "Dog" significa:</p>
<button onclick="check('correct')">Cão</button>
<button onclick="check('wrong')">Gato</button>

<p>2. "House" significa:</p>
<button onclick="check('correct')">Casa</button>
<button onclick="check('wrong')">Carro</button>

<br><br>
<button onclick="finish()">Finalizar</button>

</body>
</html>
